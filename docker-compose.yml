# Configures containerized deployment for Express Backend (5000) & Nginx Frontend (80).
# @concept Docker Deployment (GEMINI.md section 3)
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: dms-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://dms_user:dms_password@dms-postgres:5432/dms_prod?schema=public
      - PORT=5000
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - dms-db:/app/data
      - ./backups:/app/backups
    networks:
      - dms-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: dms-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - dms-network

  postgres:
    image: postgres:18-alpine
    container_name: dms-postgres
    restart: always
    environment:
      - POSTGRES_USER=dms_user
      - POSTGRES_PASSWORD=dms_password
      - POSTGRES_DB=dms_prod
    ports:
      - "5432:5432"
    volumes:
      - dms-pgdata:/var/lib/postgresql
    networks:
      - dms-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dms_user -d dms_prod"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-backup:
    image: postgres:18-alpine
    container_name: dms-db-backup
    restart: always
    environment:
      - POSTGRES_USER=dms_user
      - POSTGRES_PASSWORD=dms_password
      - POSTGRES_DB=dms_prod
      - PGHOST=dms-postgres
    volumes:
      - ./backups:/app/backups
    entrypoint: ["sh", "-c", "echo '0 2 * * * pg_dump -U dms_user -h dms-postgres -d dms_prod -F c -b -v -f /app/backups/auto_backup_$$(date +\\%F_\\%H-\\%M-\\%S).dump && find /app/backups -type f -mtime +14 -delete' > /etc/crontabs/root && crond -f -l 2"]
    networks:
      - dms-network
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  dms-db:
    driver: local
  dms-pgdata:
    driver: local

networks:
  dms-network:
    driver: bridge
